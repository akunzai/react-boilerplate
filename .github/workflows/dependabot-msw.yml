name: Update MSW Worker

on:
  pull_request:
    paths:
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: write
  pull-requests: read

jobs:
  update-msw-worker:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Check if msw was updated
        id: check-msw
        run: |
          if git diff origin/${{ github.base_ref }}..HEAD -- bun.lock | grep -q 'msw'; then
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Bun
        if: steps.check-msw.outputs.updated == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.check-msw.outputs.updated == 'true'
        run: bun install --frozen-lockfile

      - name: Update mockServiceWorker.js
        if: steps.check-msw.outputs.updated == 'true'
        run: bun run msw

      - name: Check for changes
        if: steps.check-msw.outputs.updated == 'true'
        id: check-changes
        run: |
          if git diff --quiet public/mockServiceWorker.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-msw.outputs.updated == 'true' && steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/mockServiceWorker.js
          git commit -m "Update mockServiceWorker.js for msw upgrade"
          git push
